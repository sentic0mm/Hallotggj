<script>
// -------von hier-------
    async function sha256(text) {
    const data = new TextEncoder().encode(text);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    return Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
}

async function exportSave() {
    const saveData = {
        money: money
    };

    const json = JSON.stringify(saveData);
    const hash = await sha256(json);

    const packageData = {
        data: btoa(json),
        hash: hash
    };

    const blob = new Blob([JSON.stringify(packageData)], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "slot-save.json";
    a.click();

    URL.revokeObjectURL(url);
}

async function importSave(file) {
    const text = await file.text();
    const packageData = JSON.parse(text);

    const json = atob(packageData.data);
    const hash = await sha256(json);

    if (hash !== packageData.hash) {
        alert("Save Datei wurde verändert oder ist beschädigt!");
        return;
    }

    const saveData = JSON.parse(json);

    money = saveData.money;
    updateMoney();
}
   // -------bis hier geht der export import teil-------
const symbols = ["🍒","🍋","⭐","🔔","7️⃣","💎","🍀"];

let money = 10;

let savingLocked = false;

// Easy Mode: 60% Gewinn / 40% Verlust
let easyMode = false;

const savedMoney = localStorage.getItem("money");

if (savedMoney !== null) {
    money = parseFloat(savedMoney);
}

let forceLose = false;

localStorage.removeItem("spinReload");

let spinning = false;

if (localStorage.getItem("spinReload") === "true") {
    money = 0;
    localStorage.removeItem("spinReload");
}

// ---------- Multiplayer-Zustand (muss vor updateMoney() existieren) ----------
const mpGame = { active: false, ended: false, endTime: 0, timerInt: null, endTimeout: null, rankTimeout: null };
let mpRole = null;        // null | "host" | "client"
let mpPeer = null;        // eigenes Peer-Objekt
let mpHostConn = null;    // Client: Verbindung zum Host
let mpPlayers = [];       // Host: [{id, name, money, conn}] – Host selbst hat conn = null
let mpSettings = { duration: 180, startMoney: 25, easy: false, isPublic: true };
let mpLobbyCode = null;   // Code bei privater Lobby
let mpMyName = "Spieler";
let mpLeaving = false;    // unterdrückt "Verbindung verloren" beim absichtlichen Verlassen
let mpBusy = false;       // verhindert Doppelklick beim Erstellen/Beitreten

function saveMoney() {
    localStorage.setItem("money", money);
}

const r1 = document.getElementById("r1");
const r2 = document.getElementById("r2");
const r3 = document.getElementById("r3");
const statusBox = document.getElementById("status");

function updateMoney() {
    document.getElementById("money").innerText =
        "Geld: " + money.toFixed(2) + "$";

    if (mpGame.active) {
        // Im Multiplayer NICHT in den Solo-Save schreiben,
        // sondern den aktuellen Kontostand melden.
        mpReportMoney();
    } else {
        saveMoney();
    }
}

function randomSymbol() {
    return symbols[Math.floor(Math.random() * symbols.length)];
}

// Erzeugt drei gleiche / zwei gleiche Symbole (= Gewinn)
function makeWinTriple(jackpot) {
    const x = randomSymbol();
    if (jackpot) return [x, x, x];

    let y = randomSymbol();
    while (y === x) y = randomSymbol();

    return [x, x, y]; // zwei gleiche -> Gewinn (bet * 2)
}

// Erzeugt drei unterschiedliche Symbole (= Verlust)
function makeLoseTriple() {
    const x = randomSymbol();

    let y = randomSymbol();
    while (y === x) y = randomSymbol();

    let z = randomSymbol();
    while (z === x || z === y) z = randomSymbol();

    return [x, y, z];
}

function spinReel(reel, duration) {
    return new Promise(resolve => {
        let interval = setInterval(() => {
            reel.innerText = randomSymbol();
        }, 80);

        setTimeout(() => {
            clearInterval(interval);
            const final = randomSymbol();
            reel.innerText = final;
            resolve(final);
        }, duration);
    });
}

async function startSpin() {
    updateUIState();

    if (spinning) return;

    // Multiplayer: nach Ablauf der Zeit keine neuen Spins mehr
    if (mpGame.active && mpGame.ended) {
        statusBox.className = "status";
        statusBox.innerText = "⏱ Runde vorbei!";
        return;
    }

    let bet = parseFloat(document.getElementById("bet").value);
    let spins = parseInt(document.getElementById("spinCount").value);

    if (isNaN(bet) || isNaN(spins)) return;

    if (bet <= 0 || spins <= 0) {
        statusBox.innerText = "Ungültige Eingabe!";
        return;
    }

    if (money < bet) {
        statusBox.innerText = "Kein Geld mehr!";
        return;
    }

    spinning = true;
    savingLocked = true;
    updateUIState();

    const lever = document.getElementById("lever");
    lever.classList.add("lever-pulled");
    setTimeout(() => lever.classList.remove("lever-pulled"), 250);

    for (let i = 0; i < spins; i++) {

        if (mpGame.active && mpGame.ended) {
            statusBox.className = "status";
            statusBox.innerText = "⏱ Zeit abgelaufen!";
            break;
        }

        if (money < bet) {
            statusBox.className = "status lose";
            statusBox.innerText = "Nicht genug Geld für weitere Spins!";
            break;
        }

        money -= bet;
        updateMoney();

        statusBox.innerText = "🎰 Dreht...";

        let a = await spinReel(r1, 1200);
        let b = await spinReel(r2, 1800);
        let c = await spinReel(r3, 2200);

        // Easy Mode: Ergebnis auf 60% Gewinn / 40% Verlust setzen
        if (easyMode) {
            const roll = Math.random();
            let triple;

            if (roll < 0.6) {
                // 60% Gewinn (davon ca. 10% Jackpot)
                triple = makeWinTriple(roll < 0.06);
            } else {
                // 40% Verlust
                triple = makeLoseTriple();
            }

            a = triple[0];
            b = triple[1];
            c = triple[2];

            r1.innerText = a;
            r2.innerText = b;
            r3.innerText = c;
        }

        if (forceLose) {
            forceLose = false;

            statusBox.className = "status lose";
            statusBox.innerText = "❌ Verloren";

            spinning = false;
            savingLocked = false;
            updateUIState();
            return;
        }

        let win = 0;

        if (a === b && b === c) {
            win = bet * 10;
            statusBox.className = "status jackpot";
            statusBox.innerText = "🎰 JACKPOT +" + win.toFixed(2) + "$";
        }
        else if (a === b || b === c || a === c) {
            win = bet * 2;
            statusBox.className = "status win";
            statusBox.innerText = "✅ Gewonnen +" + win.toFixed(2) + "$";
        }
        else {
            statusBox.className = "status lose";
            statusBox.innerText = "❌ Verloren";
        }

        money += win;
        updateMoney();

        await new Promise(r => setTimeout(r, 500));
    }

    spinning = false;
    savingLocked = false; // 🔓 Save wieder frei
    updateUIState();
}

if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js");

    // Wenn ein neuer Service Worker die Kontrolle übernimmt, Seite einmal
    // automatisch neu laden -> neueste Version (z.B. Multiplayer) erscheint
    // sofort, ohne dass man den Cache von Hand leeren muss.
    let swRefreshing = false;
    navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (swRefreshing) return;
        swRefreshing = true;
        window.location.reload();
    });
}

document.getElementById("importFile").addEventListener("change", async (e) => {
    if (spinning || savingLocked) {
        alert("Bitte warte bis der Spin fertig ist!");
        return;
    }

    savingLocked = true;

    const file = e.target.files[0];
    if (!file) {
        savingLocked = false;
        return;
    }

    const text = await file.text();
    const raw = JSON.parse(text);

    const json = atob(raw.data);
    const hash = await sha256(json);

    if (hash !== raw.hash) {
        alert("❌ Save manipuliert!");
        savingLocked = false;
        return;
    }

    const saveData = JSON.parse(json);

    money = saveData.money;
    updateMoney();

    alert("✔ Save geladen!");

    savingLocked = false;
});

    const locked = spinning || savingLocked;

}

// ======================================================================
// =========================== MULTIPLAYER ==============================
// ======================================================================
//
// Technik: PeerJS (WebRTC) mit dem kostenlosen öffentlichen PeerJS-Broker.
// Es gibt KEINEN eigenen Server – der Lobby-Host ist der "Server" der Runde.
//
// Öffentliche Lobbys: Hosts belegen feste Peer-IDs (pub-0 bis pub-9).
// Die Lobby-Suche probiert einfach alle 10 IDs durch und fragt Infos ab.
// Private Lobbys: zufälliger 5-stelliger Code als Teil der Peer-ID.

const MP_MAX_PLAYERS = 10;
const MP_PUB_SLOTS = 10;
const MP_ID_BASE = "sentic-slotm-v1-";
const MP_PUB_PREFIX = MP_ID_BASE + "pub-";
const MP_PRIV_PREFIX = MP_ID_BASE + "priv-";

const elMenuStatus = document.getElementById("menuStatus");
const elBrowserStatus = document.getElementById("browserStatus");
const elLobbyList = document.getElementById("lobbyList");
const elLobbyPlayers = document.getElementById("lobbyPlayers");
const elMpScores = document.getElementById("mpScores");
const elMpTimer = document.getElementById("mpTimer");

// ---------- Screens umschalten ----------

function showScreen(id) {
    for (const s of ["screenMenu", "screenBrowser", "screenLobby", "screenResults", "screenGame"]) {
        document.getElementById(s).hidden = (s !== id);
    }
}

function setMenuStatus(text) {
    elMenuStatus.innerText = text || "";
}

// ---------- Name ----------

const nameInput = document.getElementById("playerName");
nameInput.value = localStorage.getItem("playerName") || "";

function mpGetName() {
    let n = nameInput.value.trim().slice(0, 16);
    if (!n) {
        n = "Spieler" + Math.floor(Math.random() * 1000);
        nameInput.value = n;
    }
    localStorage.setItem("playerName", n);
    return n;
}

function mpAvailable() {
    if (typeof Peer === "undefined") {
        setMenuStatus("❌ Multiplayer nicht verfügbar (keine Internetverbindung?)");
        return false;
    }
    return true;
}

// ---------- Fehlerbehandlung ----------

function mpHandlePeerError(err) {
    console.warn("PeerJS Fehler:", err.type, err);
    if (err.type === "network" || err.type === "server-error" || err.type === "socket-error") {
        mpConnectionLost("❌ Verbindung zum Multiplayer-Server fehlgeschlagen.");
    }
}

function mpConnectionLost(reason) {
    const wasActive = mpRole !== null;
    mpCleanup();
    if (wasActive) {
        showScreen("screenMenu");
        setMenuStatus(reason);
    }
}

// ---------- Lobby erstellen (Host) ----------

function mpNewCode() {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let c = "";
    for (let i = 0; i < 5; i++) c += chars[Math.floor(Math.random() * chars.length)];
    return c;
}

document.getElementById("btnCreatePublic").addEventListener("click", () => {
    if (mpRole || mpBusy) return;
    if (!mpAvailable()) { showScreen("screenMenu"); return; }
    mpBusy = true;
    mpMyName = mpGetName();
    mpSettings.isPublic = true;
    elBrowserStatus.innerText = "Lobby wird erstellt…";
    const candidates = [];
    for (let i = 0; i < MP_PUB_SLOTS; i++) candidates.push(MP_PUB_PREFIX + i);
    mpTryHostId(candidates, 0, msg => { elBrowserStatus.innerText = msg; });
});

document.getElementById("btnCreatePrivate").addEventListener("click", () => {
    if (mpRole || mpBusy) return;
    if (!mpAvailable()) return;
    mpBusy = true;
    mpMyName = mpGetName();
    mpSettings.isPublic = false;
    setMenuStatus("Private Lobby wird erstellt…");
    const candidates = [];
    for (let i = 0; i < 5; i++) candidates.push(MP_PRIV_PREFIX + mpNewCode());
    mpTryHostId(candidates, 0, setMenuStatus);
});

// Probiert nacheinander Peer-IDs aus, bis eine frei ist.
function mpTryHostId(candidates, idx, statusFn) {
    if (idx >= candidates.length) {
        mpBusy = false;
        statusFn("❌ Keine freie Lobby gefunden. Bitte später nochmal versuchen!");
        return;
    }

    const id = candidates[idx];
    const peer = new Peer(id);
    let settled = false;

    peer.on("open", () => {
        if (settled) return;
        settled = true;
        mpBecomeHost(peer, id);
    });

    peer.on("error", err => {
        if (!settled && err.type === "unavailable-id") {
            settled = true;
            peer.destroy();
            mpTryHostId(candidates, idx + 1, statusFn);
            return;
        }
        if (!settled && (err.type === "network" || err.type === "server-error" || err.type === "socket-error")) {
            settled = true;
            peer.destroy();
            mpBusy = false;
            statusFn("❌ Verbindung zum Multiplayer-Server fehlgeschlagen.");
            return;
        }
        mpHandlePeerError(err);
    });
}

function mpBecomeHost(peer, id) {
    mpBusy = false;
    mpRole = "host";
    mpPeer = peer;
    mpLobbyCode = mpSettings.isPublic ? null : id.slice(MP_PRIV_PREFIX.length);
    mpPlayers = [{ id: "host", name: mpMyName, money: 0, conn: null }];

    peer.on("connection", conn => mpHostOnConnection(conn));

    // Bei kurzem Broker-Aussetzer wieder verbinden (bestehende
    // WebRTC-Verbindungen laufen davon unabhängig weiter).
    peer.on("disconnected", () => {
        if (!mpLeaving && mpPeer === peer && !peer.destroyed) peer.reconnect();
    });

    setMenuStatus("");
    elBrowserStatus.innerText = "";
    mpShowLobby();
    mpBroadcastLobby();
}

function mpHostOnConnection(conn) {
    conn.on("data", raw => {
        const msg = raw || {};

        // Lobby-Suche fragt nur Infos ab
        if (msg.type === "info?") {
            conn.send({
                type: "info",
                name: mpMyName + "s Lobby",
                players: mpPlayers.length,
                max: MP_MAX_PLAYERS,
                inGame: mpGame.active
            });
            return;
        }

        if (msg.type === "join") {
            if (mpGame.active) {
                conn.send({ type: "reject", reason: "Die Runde läuft schon!" });
                setTimeout(() => conn.close(), 500);
                return;
            }
            if (mpPlayers.length >= MP_MAX_PLAYERS) {
                conn.send({ type: "reject", reason: "Lobby ist voll (" + MP_MAX_PLAYERS + "/" + MP_MAX_PLAYERS + ")!" });
                setTimeout(() => conn.close(), 500);
                return;
            }
            const name = String(msg.name || "Spieler").slice(0, 16);
            mpPlayers.push({ id: conn.peer, name: name, money: 0, conn: conn });
            conn.send({ type: "welcome", settings: mpSettings, code: mpLobbyCode, hostName: mpMyName });
            mpBroadcastLobby();
            return;
        }

        if (msg.type === "money" || msg.type === "final") {
            const p = mpPlayers.find(p => p.conn === conn);
            if (p) {
                p.money = Number(msg.value) || 0;
                if (mpGame.active) mpBroadcastScores();
            }
            return;
        }
    });

    conn.on("close", () => {
        const i = mpPlayers.findIndex(p => p.conn === conn);
        if (i >= 0) {
            mpPlayers.splice(i, 1);
            mpBroadcastLobby();
            if (mpGame.active) mpBroadcastScores();
        }
    });

    conn.on("error", () => {});
}

function mpBroadcast(msg) {
    for (const p of mpPlayers) {
        if (p.conn && p.conn.open) p.conn.send(msg);
    }
}

function mpBroadcastLobby() {
    const list = mpPlayers.map(p => ({ id: p.id, name: p.name, host: p.conn === null }));
    mpBroadcast({ type: "lobby", players: list, settings: mpSettings });
    mpRenderLobby(list);
}

function mpBroadcastScores() {
    const scores = mpPlayers.map(p => ({ id: p.id, name: p.name, money: p.money }));
    mpBroadcast({ type: "scores", scores: scores });
    mpRenderScores(scores);
}

// ---------- Lobby beitreten (Client) ----------

document.getElementById("btnJoinCode").addEventListener("click", () => {
    const code = document.getElementById("joinCode").value.trim().toUpperCase();
    if (code.length !== 5) {
        setMenuStatus("❌ Der Code hat 5 Zeichen!");
        return;
    }
    if (!mpAvailable()) return;
    mpJoin(MP_PRIV_PREFIX + code, setMenuStatus);
});

document.getElementById("joinCode").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("btnJoinCode").click();
});

function mpJoin(hostId, statusFn) {
    if (mpRole || mpBusy) return;
    mpBusy = true;
    mpMyName = mpGetName();
    statusFn("Trete bei…");

    const peer = new Peer();
    let joined = false;
    let failed = false;

    const failTimer = setTimeout(() => {
        if (!joined && !failed) {
            failed = true;
            mpBusy = false;
            peer.destroy();
            statusFn("❌ Lobby nicht erreichbar.");
        }
    }, 10000);

    peer.on("open", () => {
        const conn = peer.connect(hostId, { reliable: true });

        conn.on("open", () => {
            conn.send({ type: "join", name: mpMyName });
        });

        conn.on("data", raw => {
            const msg = raw || {};

            if (msg.type === "welcome") {
                joined = true;
                clearTimeout(failTimer);
                mpBusy = false;
                mpRole = "client";
                mpPeer = peer;
                mpHostConn = conn;
                mpSettings = msg.settings;
                mpLobbyCode = msg.code;
                statusFn("");
                setMenuStatus("");
                mpShowLobby();
            }
            else if (msg.type === "reject") {
                failed = true;
                clearTimeout(failTimer);
                mpBusy = false;
                statusFn("❌ " + msg.reason);
                peer.destroy();
            }
            else if (msg.type === "lobby") {
                mpSettings = msg.settings;
                mpApplySettingsToUI();
                mpRenderLobby(msg.players);
            }
            else if (msg.type === "start") {
                mpSettings = msg.settings;
                mpStartRound();
            }
            else if (msg.type === "scores") {
                mpRenderScores(msg.scores);
            }
            else if (msg.type === "timeup") {
                mpLocalTimeUp();
            }
            else if (msg.type === "gameover") {
                mpShowResults(msg.ranking);
            }
        });

        conn.on("close", () => {
            if (joined && !mpLeaving) {
                mpConnectionLost("❌ Der Host hat die Lobby geschlossen.");
            }
        });

        conn.on("error", () => {});
    });

    peer.on("error", err => {
        if (err.type === "peer-unavailable") {
            if (!joined && !failed) {
                failed = true;
                clearTimeout(failTimer);
                mpBusy = false;
                peer.destroy();
                statusFn("❌ Lobby nicht gefunden! Code prüfen?");
            }
            return;
        }
        mpHandlePeerError(err);
    });
}

let mpScanning = false;

function mpScanLobbies() {
    if (mpScanning || typeof Peer === "undefined") return;
    mpScanning = true;

    elBrowserStatus.innerText = "";
    elLobbyList.innerHTML = '<div class="lobby-entry">🔍 Suche Lobbys…</div>';

    const peer = new Peer();
    const found = [];
    let pending = MP_PUB_SLOTS;
    let finished = false;

    function done() {
        pending--;
        if (pending <= 0) finalize();
    }

    function finalize() {
        if (finished) return;
        finished = true;
        mpScanning = false;
        peer.destroy();
        mpRenderLobbyList(found);
    }

    peer.on("open", () => {
        for (let i = 0; i < MP_PUB_SLOTS; i++) {
            const hostId = MP_PUB_PREFIX + i;
            const conn = peer.connect(hostId);

            conn.on("open", () => conn.send({ type: "info?" }));

            conn.on("data", msg => {
                if (msg && msg.type === "info") {
                    found.push({ hostId: hostId, name: msg.name, players: msg.players, max: msg.max, inGame: msg.inGame });
                    conn.close();
                    done();
                }
            });
        }
    });

    // Für jede nicht existierende Lobby meldet PeerJS "peer-unavailable"
    peer.on("error", err => {
        if (err.type === "peer-unavailable") done();
        else finalize();
    });

    // Sicherheitsnetz: nach 6 Sekunden auf jeden Fall Ergebnis anzeigen
    setTimeout(finalize, 6000);
}

function mpRenderLobbyList(list) {
    if (list.length === 0) {
        elLobbyList.innerHTML = '<div class="lobby-entry">😴 Keine öffentlichen Lobbys gefunden. Mach doch selber eine auf!</div>';
        return;
    }

    elLobbyList.innerHTML = "";
    for (const l of list) {
        const row = document.createElement("div");
        row.className = "lobby-entry";

        const info = document.createElement("span");
        info.innerText = "🎰 " + l.name + " — " + l.players + "/" + l.max;
        row.appendChild(info);

        if (l.inGame) {
            const badge = document.createElement("span");
            badge.className = "badge";
            badge.innerText = "▶ Runde läuft";
            row.appendChild(badge);
        } else if (l.players >= l.max) {
            const badge = document.createElement("span");
            badge.className = "badge";
            badge.innerText = "Voll";
            row.appendChild(badge);
        } else {
            const btn = document.createElement("button");
            btn.className = "join-btn";
            btn.innerText = "Beitreten";
            btn.addEventListener("click", () => {
                mpJoin(l.hostId, msg => { elBrowserStatus.innerText = msg; });
            });
            row.appendChild(btn);
        }

        elLobbyList.appendChild(row);
    }
}

// ---------- Lobby-Screen ----------

const elSetDuration = document.getElementById("setDuration");
const elSetStartMoney = document.getElementById("setStartMoney");
const elSetEasy = document.getElementById("setEasy");

function mpApplySettingsToUI() {
    elSetDuration.value = String(mpSettings.duration);
    elSetStartMoney.value = String(mpSettings.startMoney);
    elSetEasy.checked = !!mpSettings.easy;
}

function mpOnSettingChanged() {
    if (mpRole !== "host") return;
    mpSettings.duration = parseInt(elSetDuration.value);
    mpSettings.startMoney = parseInt(elSetStartMoney.value);
    mpSettings.easy = elSetEasy.checked;
    mpBroadcastLobby();
}

elSetDuration.addEventListener("change", mpOnSettingChanged);
elSetStartMoney.addEventListener("change", mpOnSettingChanged);
elSetEasy.addEventListener("change", mpOnSettingChanged);

function mpShowLobby() {
    const isHost = mpRole === "host";

    document.getElementById("lobbyTitle").innerText =
        mpSettings.isPublic ? "🌍 Öffentliche Lobby" : "🔒 Private Lobby";

    const codeWrap = document.getElementById("lobbyCodeWrap");
    codeWrap.hidden = !mpLobbyCode;
    if (mpLobbyCode) document.getElementById("lobbyCodeBox").innerText = mpLobbyCode;

    elSetDuration.disabled = !isHost;
    elSetStartMoney.disabled = !isHost;
    elSetEasy.disabled = !isHost;
    mpApplySettingsToUI();

    document.getElementById("btnStartGame").hidden = !isHost;
    document.getElementById("lobbyHint").innerText =
        isHost ? "" : "Warte bis der Host das Spiel startet…";

    showScreen("screenLobby");
}

function mpRenderLobby(players) {
    const myId = mpRole === "host" ? "host" : (mpPeer ? mpPeer.id : null);

    elLobbyPlayers.innerHTML = "";

    const head = document.createElement("div");
    head.className = "player-row";
    head.innerText = "👥 Spieler (" + players.length + "/" + MP_MAX_PLAYERS + ")";
    head.style.color = "#aaa";
    elLobbyPlayers.appendChild(head);

    for (const p of players) {
        const row = document.createElement("div");
        row.className = "player-row" + (p.id === myId ? " me" : "");
        row.innerText = (p.host ? "👑 " : "🎮 ") + p.name + (p.id === myId ? " (Du)" : "");
        elLobbyPlayers.appendChild(row);
    }
}

});

document.getElementById("btnLeaveLobby").addEventListener("click", () => {
    if (mpRole === "host" && mpPlayers.length > 1) {
        if (!confirm("Wenn du gehst, wird die Lobby für alle geschlossen. Sicher?")) return;
    }
    mpLeaveLobby();
});

// ---------- Runde starten & spielen ----------

document.getElementById("btnStartGame").addEventListener("click", () => {
    if (mpRole !== "host" || mpGame.active) return;

    mpBroadcast({ type: "start", settings: mpSettings });
    mpStartRound();

    // Der Host ist die Zeit-Autorität: Er beendet die Runde für alle.
    mpGame.endTimeout = setTimeout(() => {
        mpBroadcast({ type: "timeup" });
        mpLocalTimeUp();

        // Kurze Gnadenfrist, damit letzte Geld-Updates noch ankommen,
        // dann Endstand an alle schicken.
        mpGame.rankTimeout = setTimeout(() => {
            const ranking = mpPlayers
                .map(p => ({ id: p.id, name: p.name, money: p.money }))
                .sort((a, b) => b.money - a.money);
            mpBroadcast({ type: "gameover", ranking: ranking });
            mpShowResults(ranking);
        }, 3000);
    }, mpSettings.duration * 1000);
});

function mpStartRound() {
    mpGame.active = true;
    mpGame.ended = false;
    mpGame.endTime = Date.now() + mpSettings.duration * 1000;

    // Alle spielen mit den gleichen Regeln
    easyMode = !!mpSettings.easy;
    money = mpSettings.startMoney;
    if (mpRole === "host") {
        for (const p of mpPlayers) p.money = mpSettings.startMoney;
    }

    document.getElementById("bet").value = 1;
    document.getElementById("spinCount").value = 1;
    statusBox.className = "status win";
    statusBox.innerText = "🚦 Los geht's! Wer am Ende am meisten hat, gewinnt!";

    document.body.classList.add("mp-active");
    document.getElementById("mpSidebar").hidden = false;
    showScreen("screenGame");

    updateMoney();
    if (mpRole === "host") mpBroadcastScores();

    clearInterval(mpGame.timerInt);
    mpGame.timerInt = setInterval(mpTickTimer, 250);
    mpTickTimer();
}

function mpTickTimer() {
    const left = Math.max(0, mpGame.endTime - Date.now());
    const totalSec = Math.ceil(left / 1000);
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;

    elMpTimer.innerText = m + ":" + String(s).padStart(2, "0");
    elMpTimer.classList.toggle("time-low", totalSec <= 30 && totalSec > 0);

    // Lokal keine neuen Spins mehr zulassen, sobald die Zeit rum ist.
    // Das offizielle Ende ("timeup") kommt vom Host.
    if (left <= 0 && !mpGame.ended) {
        mpGame.ended = true;
    }
}

function mpLocalTimeUp() {
    mpGame.ended = true;
    clearInterval(mpGame.timerInt);
    elMpTimer.innerText = "0:00";
    elMpTimer.classList.remove("time-low");

    statusBox.className = "status";
    statusBox.innerText = "⏱ Zeit abgelaufen! Warte auf das Ergebnis…";

    // Endgültigen Kontostand melden
    mpReportMoney();
}

function mpReportMoney() {
    if (mpRole === "host") {
        const me = mpPlayers.find(p => p.conn === null);
        if (me) {
            me.money = money;
            mpBroadcastScores();
        }
    } else if (mpHostConn && mpHostConn.open) {
        mpHostConn.send({ type: mpGame.ended ? "final" : "money", value: money });
    }
}

// ---------- Scoreboard ----------

function mpRenderScores(scores) {
    const myId = mpRole === "host" ? "host" : (mpPeer ? mpPeer.id : null);
    const sorted = scores.slice().sort((a, b) => b.money - a.money);
    const medals = ["🥇", "🥈", "🥉"];

    elMpScores.innerHTML = "";
    sorted.forEach((p, i) => {
        const row = document.createElement("div");
        row.className = "score-row" + (p.id === myId ? " self" : "");

        const name = document.createElement("span");
        name.className = "score-name";
        name.innerText = (medals[i] || (i + 1) + ".") + " " + p.name + (p.id === myId ? " (Du)" : "");

        const val = document.createElement("span");
        val.className = "score-money";
        val.innerText = p.money.toFixed(2) + "$";

        row.appendChild(name);
        row.appendChild(val);
        elMpScores.appendChild(row);
    });
}

document.getElementById("btnMpLeave").addEventListener("click", () => {
    if (!confirm("Runde wirklich verlassen?")) return;
    mpLeaveLobby();
});

// ---------- Ergebnis ----------

function mpShowResults(ranking) {
    mpGame.active = false;
    mpGame.ended = false;
    clearInterval(mpGame.timerInt);
    clearTimeout(mpGame.endTimeout);
    clearTimeout(mpGame.rankTimeout);

    const myId = mpRole === "host" ? "host" : (mpPeer ? mpPeer.id : null);
    const winnerBox = document.getElementById("resultWinner");

    if (ranking.length === 0) {
        winnerBox.innerText = "🤷 Niemand mehr da…";
    } else {
        const top = ranking[0].money;
        const winners = ranking.filter(p => p.money === top);
        if (winners.length > 1) {
            winnerBox.innerText = "🤝 Unentschieden: " + winners.map(p => p.name).join(", ") + " (" + top.toFixed(2) + "$)";
        } else {
            winnerBox.innerText = "🏆 " + winners[0].name + " gewinnt mit " + top.toFixed(2) + "$!";
        }
    }

    const medals = ["🥇", "🥈", "🥉"];
    const list = document.getElementById("resultList");
    list.innerHTML = "";
    ranking.forEach((p, i) => {
        const row = document.createElement("div");
        row.className = "result-row" + (p.id === myId ? " me" : "");

        const name = document.createElement("span");
        name.innerText = (medals[i] || (i + 1) + ".") + " " + p.name + (p.id === myId ? " (Du)" : "");

        const val = document.createElement("span");
        val.innerText = p.money.toFixed(2) + "$";

        row.appendChild(name);
        row.appendChild(val);
        list.appendChild(row);
    });

    showScreen("screenResults");
}

document.getElementById("btnBackToLobby").addEventListener("click", () => {
    if (!mpRole) { showScreen("screenMenu"); return; }
    mpShowLobby();
    if (mpRole === "host") mpBroadcastLobby();
});

document.getElementById("btnResultsLeave").addEventListener("click", mpLeaveLobby);

// ---------- Verlassen & Aufräumen ----------

function mpCleanup() {
    mpLeaving = true;

    clearInterval(mpGame.timerInt);
    clearTimeout(mpGame.endTimeout);
    clearTimeout(mpGame.rankTimeout);
    mpGame.active = false;
    mpGame.ended = false;

    if (mpPeer) {
        try { mpPeer.destroy(); } catch (e) {}
    }
    mpPeer = null;
    mpHostConn = null;
    mpRole = null;
    mpPlayers = [];
    mpLobbyCode = null;
    mpBusy = false;

    document.body.classList.remove("mp-active");
    document.getElementById("mpSidebar").hidden = true;

    // Easy Mode zurücksetzen (könnte durch die Lobby-Einstellung an sein)
    easyMode = false;
    const btnEasy = document.getElementById("btnEasy");
    btnEasy.classList.remove("easy-active");
    btnEasy.innerText = "easy mode";

    // Solo-Geld aus dem Save wiederherstellen
    const sm = localStorage.getItem("money");
    money = sm !== null ? parseFloat(sm) : 10;
    updateMoney();

    mpLeaving = false;
}

function mpLeaveLobby() {
    mpCleanup();
    showScreen("screenMenu");
    setMenuStatus("");
}

// Beim Laden: Hauptmenü anzeigen
showScreen("screenMenu");
</script>
