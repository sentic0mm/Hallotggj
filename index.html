<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gamblen ist toll</title>

<link rel="manifest" href="manifest.json">

<style>

body {
    margin: 0;
    background: #1b1b1b;
    color: white;
    font-family: Arial, sans-serif;
}

.container {
    display: flex;
    min-height: 100vh;
}

.left {
    width: 180px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #111;
}

#lever {
    width: 120px;
    height: 260px;
    font-size: 26px;
    cursor: pointer;
    border: none;
    border-radius: 15px;
    background: #444;
    color: white;
    transition: transform .25s;
}

.lever-pulled {
    transform: rotate(25deg);
}

.right {
    flex: 1;
    padding: 30px;
}

.money {
    font-size: 38px;
    margin-bottom: 20px;
}

.reels {
    display: flex;
    gap: 20px;
    margin: 30px 0;
}

.reel {
    width: 130px;
    height: 130px;
    background: white;
    color: black;
    font-size: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 15px;
    box-shadow: 0 0 15px #000;
}

.status {
    font-size: 28px;
    min-height: 40px;
    margin-bottom: 20px;
}

label {
    display: block;
    margin-top: 15px;
}

input {
    width: 200px;
    padding: 10px;
    font-size: 18px;
}

.buttons {
    margin-top: 25px;
}

.buttons button {
    padding: 12px 20px;
    font-size: 18px;
    margin-right: 10px;
    cursor: pointer;
}

.win { color: #00ff66; }
.lose { color: #ff5555; }
.jackpot { color: gold; }

.save-buttons {
    margin-top: 0;
    position: relative;
    top: -10px;
}

.save-buttons button,
.import-btn {
    background: #222;
    color: white;
    border: 1px solid #444;
    padding: 12px 15px;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
    user-select: none;
    width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    box-sizing: border-box;
    height: 44px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}

.save-buttons button:hover,
.import-btn:hover {
    background: #333;
    transform: scale(1.05);
}

.import-btn input {
    display: none;
}

#btnReset {
    background: #222;
    color: white;
    border: 1px solid #444;
    padding: 12px 15px;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
    user-select: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    width: 220px;
    box-sizing: border-box;
    white-space: nowrap;
    overflow: hidden;
}

#btnReset:hover {
    background: #400000;
    color: #ffcccc;
    border-color: #ff0000;
}

#btnRefresh {
    background: #222;
    color: white;
    border: 1px solid #444;
    padding: 12px 15px;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
    user-select: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    width: 180px;
    box-sizing: border-box;
    white-space: nowrap;
    overflow: hidden;
}

#btnRefresh:hover {
    background: #3a3300;
    border-color: #ffd400;
    color: #faefb8;
}

/* ── Sprach-Button ── */
#btnLang {
    background: #222;
    color: white;
    border: 1px solid #555;
    padding: 12px 18px;
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 1px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
    user-select: none;
    display: inline-block;
    box-sizing: border-box;
    margin-left: 8px;
}

#btnLang:hover {
    background: #333;
    border-color: #aaa;
}

</style>
</head>

<body>

<button id="btnRefresh"><span class="btn-label">refresh moneten</span></button>
<button id="btnLang">DE</button>

<div class="container">

    <div class="left">
        <button id="lever">
            🔴<br>│<br>│<br>│<br>■■■
        </button>
    </div>

    <div class="right">

        <button id="btnReset"><span class="btn-icon">🗑</span><span class="btn-label">Reset (Cache leeren)</span></button>

        <div class="save-buttons">
            <button id="btnExport"><span class="btn-icon">💾</span><span class="btn-label">Export Save</span></button>
            <label class="import-btn">
                <span class="btn-icon">📂</span><span class="btn-label">Import Save</span>
                <input type="file" id="importFile" accept=".json">
            </label>
        </div>

        <div class="money" id="money">Geld: 10.00$</div>

        <div class="reels">
            <div class="reel" id="r1">🍒</div>
            <div class="reel" id="r2">🍋</div>
            <div class="reel" id="r3">⭐</div>
        </div>

        <div class="status" id="status">Hebel ziehen!</div>

        <label id="labelBet">Einsatz</label>
        <input id="bet" type="number" value="1" min="1">

        <label id="labelSpins">Anzahl Spins</label>
        <input id="spinCount" type="number" value="1" min="1">

        <div class="buttons">
            <button id="btnAllIn">ALL IN</button>
            <button id="btnCashOut">CASH OUT</button>
        </div>

    </div>
</div>

<script>

// ── Übersetzungen / Translations ──────────────────────────────────────────────
const translations = {
    de: {
        moneyPrefix:      "Geld: ",
        statusStart:      "Hebel ziehen!",
        labelBet:         "Einsatz",
        labelSpins:       "Anzahl Spins",
        spinning:         "🎰 Dreht...",
        jackpot:          "🎰 JACKPOT +",
        win:              "✅ Gewonnen +",
        lose:             "❌ Verloren",
        noMoney:          "Kein Geld mehr!",
        notEnoughSpin:    "Nicht genug Geld für weitere Spins!",
        invalidInput:     "Ungültige Eingabe!",
        resetDuring:      "❌ Während des Spins zurückgesetzt!",
        resetDone:        "💰 Geld zurückgesetzt!",
        cashOut:          "Ausgezahlt: ",
        resetBtn:         "🗑 Reset (Cache leeren)",
        refreshBtn:       "refresh moneten",
        exportBtn:        "💾 Export Save",
        importLabel:      "📂 Import Save",
        resetConfirm1a:   "⚠️ ACHTUNG! ⚠️\n\nCache inhalt größe: ",
        resetConfirm1b:   " KB\n\nDu bist dabei ALLE lokalen Daten zu löschen.\n\n👉 Es wird empfohlen vorher deinen Save zu exportieren!",
        resetConfirm2:    "Bist du WIRKLICH sicher?\n\nDiese Aktion kann nicht rückgängig gemacht werden!",
        cacheCleared:     "Cache gelöscht!",
        cacheStatus:      "🗑 Daten zurückgesetzt!",
        waitSpin:         "Bitte warte bis der Spin fertig ist!",
        saveManipulated:  "❌ Save manipuliert!",
        saveLoaded:       "✔ Save geladen!",
        saveCorrupted:    "Save Datei wurde verändert oder ist beschädigt!"
    },
    en: {
        moneyPrefix:      "Money: ",
        statusStart:      "Pull the lever!",
        labelBet:         "Bet",
        labelSpins:       "Number of Spins",
        spinning:         "🎰 Spinning...",
        jackpot:          "🎰 JACKPOT +",
        win:              "✅ Won +",
        lose:             "❌ Lost",
        noMoney:          "Not enough money!",
        notEnoughSpin:    "Not enough money for more spins!",
        invalidInput:     "Invalid input!",
        resetDuring:      "❌ Reset during spin!",
        resetDone:        "💰 Money reset!",
        cashOut:          "Cashed out: ",
        resetBtn:         "🗑 Reset (clear cache)",
        refreshBtn:       "refresh money",
        exportBtn:        "💾 Export Save",
        importLabel:      "📂 Import Save",
        resetConfirm1a:   "⚠️ WARNING! ⚠️\n\nCache size: ",
        resetConfirm1b:   " KB\n\nYou are about to delete ALL local data.\n\n👉 It is recommended to export your save first!",
        resetConfirm2:    "Are you REALLY sure?\n\nThis action cannot be undone!",
        cacheCleared:     "Cache cleared!",
        cacheStatus:      "🗑 Data reset!",
        waitSpin:         "Please wait until the spin is finished!",
        saveManipulated:  "❌ Save manipulated!",
        saveLoaded:       "✔ Save loaded!",
        saveCorrupted:    "Save file has been modified or is corrupted!"
    }
};

let currentLang = localStorage.getItem("lang") || "de";

function t(key) {
    return translations[currentLang][key];
}

function applyLanguage() {
    document.getElementById("btnLang").textContent   = currentLang.toUpperCase();
    document.getElementById("labelBet").textContent  = t("labelBet");
    document.getElementById("labelSpins").textContent = t("labelSpins");
    document.querySelector("#btnReset .btn-label").textContent   = t("resetBtn").replace(/^🗑 /, "");
    document.querySelector("#btnRefresh .btn-label").textContent = t("refreshBtn");
    document.querySelector("#btnExport .btn-label").textContent  = "Export Save";
    document.querySelector(".import-btn .btn-label").textContent = "Import Save";

    updateMoney();

    if (!spinning) {
        statusBox.className = "status";
        statusBox.innerText = t("statusStart");
    }
}

function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem("lang", lang);
    document.documentElement.lang = lang;
    applyLanguage();
}

document.getElementById("btnLang").addEventListener("click", () => {
    setLanguage(currentLang === "de" ? "en" : "de");
});

// ── Export / Import ───────────────────────────────────────────────────────────
async function sha256(text) {
    const data = new TextEncoder().encode(text);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    return Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
}

async function exportSave() {
    const saveData = { money };
    const json = JSON.stringify(saveData);
    const hash = await sha256(json);
    const packageData = { data: btoa(json), hash };
    const blob = new Blob([JSON.stringify(packageData)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "slot-save.json";
    a.click();
    URL.revokeObjectURL(url);
}

async function importSave(file) {
    const text = await file.text();
    const packageData = JSON.parse(text);
    const json = atob(packageData.data);
    const hash = await sha256(json);
    if (hash !== packageData.hash) {
        alert(t("saveCorrupted"));
        return;
    }
    const saveData = JSON.parse(json);
    money = saveData.money;
    updateMoney();
}

// ── Spiellogik ────────────────────────────────────────────────────────────────
const symbols = ["🍒","🍋","⭐","🔔","7️⃣","💎","🍀"];

let money = 10;
let savingLocked = false;

const savedMoney = localStorage.getItem("money");
if (savedMoney !== null) money = parseFloat(savedMoney);

let forceLose = false;
localStorage.removeItem("spinReload");
let spinning = false;

if (localStorage.getItem("spinReload") === "true") {
    money = 0;
    localStorage.removeItem("spinReload");
}

function saveMoney() {
    localStorage.setItem("money", money);
}

const r1 = document.getElementById("r1");
const r2 = document.getElementById("r2");
const r3 = document.getElementById("r3");
const statusBox = document.getElementById("status");

function updateMoney() {
    document.getElementById("money").innerText =
        t("moneyPrefix") + money.toFixed(2) + "$";
    saveMoney();
}

function randomSymbol() {
    return symbols[Math.floor(Math.random() * symbols.length)];
}

function spinReel(reel, duration) {
    return new Promise(resolve => {
        let interval = setInterval(() => {
            reel.innerText = randomSymbol();
        }, 80);
        setTimeout(() => {
            clearInterval(interval);
            const final = randomSymbol();
            reel.innerText = final;
            resolve(final);
        }, duration);
    });
}

async function startSpin() {
    updateUIState();
    if (spinning) return;

    let bet   = parseFloat(document.getElementById("bet").value);
    let spins = parseInt(document.getElementById("spinCount").value);

    if (isNaN(bet) || isNaN(spins)) return;

    if (bet <= 0 || spins <= 0) {
        statusBox.innerText = t("invalidInput");
        return;
    }

    if (money < bet) {
        statusBox.innerText = t("noMoney");
        return;
    }

    spinning = true;
    savingLocked = true;
    updateUIState();

    const lever = document.getElementById("lever");
    lever.classList.add("lever-pulled");
    setTimeout(() => lever.classList.remove("lever-pulled"), 250);

    for (let i = 0; i < spins; i++) {
        if (money < bet) {
            statusBox.className = "status lose";
            statusBox.innerText = t("notEnoughSpin");
            break;
        }

        money -= bet;
        updateMoney();

        statusBox.className = "status";
        statusBox.innerText = t("spinning");

        const a = await spinReel(r1, 1200);
        const b = await spinReel(r2, 1800);
        const c = await spinReel(r3, 2200);

        if (forceLose) {
            forceLose = false;
            statusBox.className = "status lose";
            statusBox.innerText = t("lose");
            spinning = false;
            savingLocked = false;
            updateUIState();
            return;
        }

        let win = 0;

        if (a === b && b === c) {
            win = bet * 10;
            statusBox.className = "status jackpot";
            statusBox.innerText = t("jackpot") + win.toFixed(2) + "$";
        } else if (a === b || b === c || a === c) {
            win = bet * 2;
            statusBox.className = "status win";
            statusBox.innerText = t("win") + win.toFixed(2) + "$";
        } else {
            statusBox.className = "status lose";
            statusBox.innerText = t("lose");
        }

        money += win;
        updateMoney();

        await new Promise(r => setTimeout(r, 500));
    }

    spinning = false;
    savingLocked = false;
    updateUIState();
}

document.getElementById("lever").addEventListener("click", startSpin);

document.getElementById("btnRefresh").addEventListener("click", () => {
    if (spinning) {
        forceLose = true;
        money = 10;
        updateMoney();
        statusBox.className = "status lose";
        statusBox.innerText = t("resetDuring");
    } else {
        money = 10;
        updateMoney();
        statusBox.className = "status";
        statusBox.innerText = t("resetDone");
    }
});

document.getElementById("btnAllIn").addEventListener("click", () => {
    document.getElementById("bet").value = Math.max(1, Math.floor(money));
});

document.getElementById("btnCashOut").addEventListener("click", () => {
    statusBox.className = "status";
    statusBox.innerText = t("cashOut") + money.toFixed(2) + "$";
});

document.getElementById("btnExport").addEventListener("click", exportSave);

document.getElementById("importFile").addEventListener("change", async (e) => {
    if (spinning || savingLocked) {
        alert(t("waitSpin"));
        return;
    }
    savingLocked = true;
    const file = e.target.files[0];
    if (!file) { savingLocked = false; return; }

    const text = await file.text();
    const raw = JSON.parse(text);
    const json = atob(raw.data);
    const hash = await sha256(json);

    if (hash !== raw.hash) {
        alert(t("saveManipulated"));
        savingLocked = false;
        return;
    }

    const saveData = JSON.parse(json);
    money = saveData.money;
    updateMoney();
    alert(t("saveLoaded"));
    savingLocked = false;
});

function updateUIState() {
    const locked = spinning || savingLocked;
    document.getElementById("btnExport").disabled = locked;
    document.getElementById("importFile").disabled = locked;
}

document.getElementById("btnReset").addEventListener("click", () => {
    const confirm1 = confirm(
        t("resetConfirm1a") + (localStorage.length * 2) + t("resetConfirm1b")
    );
    if (!confirm1) return;

    const confirm2 = confirm(t("resetConfirm2"));
    if (!confirm2) return;

    localStorage.clear();
    money = 10;
    updateMoney();
    statusBox.className = "status lose";
    statusBox.innerText = t("cacheStatus");
    alert(t("cacheCleared"));
});

if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js");
}

// Sprache beim Start anwenden
applyLanguage();

</script>

</body>
</html>
