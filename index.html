<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gamblen ist toll - Multiplayer</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen">
  <h1>🎰 Gamblen ist toll</h1>
  <div class="menu-buttons">
    <button id="btn-goto-solo">Solo spielen</button>
    <button id="btn-goto-create">Lobby erstellen</button>
    <button id="btn-goto-join">Lobby beitreten (Code)</button>
    <button id="btn-goto-public">Öffentliche Lobbys</button>
  </div>
</div>

<!-- SOLO -->
<div id="screen-solo" class="screen hidden">
  <button class="btn-back" id="btn-back-solo">← Zurück</button>

  <div class="solo-toolbar">
    <button id="solo-btn-refresh">refresh moneten</button>
    <button id="solo-btn-easy">easy mode</button>
    <button id="solo-btn-reset-cache">🗑 Reset (Cache leeren)</button>
    <button id="solo-btn-export">💾 Export Save</button>
    <label class="import-btn">
      📂 Import Save
      <input type="file" id="solo-import-file" accept=".json">
    </label>
  </div>

  <div class="machine">
    <div class="reels-panel">
      <div class="money" id="solo-money">Geld: 10.00$</div>

      <div class="reels">
        <div class="reel" id="solo-r1">🍒</div>
        <div class="reel" id="solo-r2">🍋</div>
        <div class="reel" id="solo-r3">⭐</div>
      </div>

      <div class="status" id="solo-status">Hebel ziehen!</div>

      <label>Einsatz</label>
      <input id="solo-bet" type="number" value="1" min="1">

      <label>Anzahl Spins</label>
      <input id="solo-spins" type="number" value="1" min="1">

      <div class="buttons">
        <button id="solo-btn-allin">ALL IN</button>
        <button id="solo-btn-reset">🗑 Reset</button>
      </div>
    </div>

    <div class="lever-panel">
      <button id="solo-lever" class="lever-btn">🔴<br>│<br>│<br>│<br>■■■</button>
    </div>
  </div>
</div>

<!-- CREATE -->
<div id="screen-create" class="screen hidden">
  <button class="btn-back" id="btn-back-1">← Zurück</button>
  <h2>Lobby erstellen</h2>

  <label>Dein Username</label>
  <input id="create-username" type="text" maxlength="20">

  <label>Dein PIN (min. 4 Zeichen, merken!)</label>
  <input id="create-pin" type="password" maxlength="20">

  <label><input id="create-public" type="checkbox"> Öffentliche Lobby</label>

  <div id="create-name-wrap" class="hidden">
    <label>Lobby-Name</label>
    <input id="create-name" type="text" maxlength="30">
  </div>

  <label>Dauer der Runde (Minuten)</label>
  <input id="create-duration" type="number" value="10" min="1">

  <button id="btn-create-submit" class="btn-primary">Lobby erstellen & starten</button>
</div>

<!-- JOIN -->
<div id="screen-join" class="screen hidden">
  <button class="btn-back" id="btn-back-2">← Zurück</button>
  <h2>Lobby beitreten</h2>

  <label>Lobby-Code</label>
  <input id="join-code" type="text" maxlength="5" style="text-transform:uppercase">

  <label>Dein Username</label>
  <input id="join-username" type="text" maxlength="20">

  <label>Dein PIN</label>
  <input id="join-pin" type="password" maxlength="20">

  <button id="btn-join-submit" class="btn-primary">Beitreten</button>
</div>

<!-- PUBLIC LIST -->
<div id="screen-public-list" class="screen hidden">
  <button class="btn-back" id="btn-back-3">← Zurück</button>
  <h2>Öffentliche Lobbys</h2>
  <div id="public-list"></div>
</div>

<!-- GAME (Lobby) -->
<div id="screen-game" class="screen hidden">

  <div class="game-topbar">
    <div>
      <span id="lobby-title"></span>
      <span id="lobby-status"></span>
      <span id="countdown"></span>
    </div>
    <div class="topbar-right">
      <button id="btn-start-round" class="hidden">Runde starten</button>
      <button id="btn-abort" class="btn-danger">Abbrechen</button>
    </div>
  </div>

  <div id="winner-box" class="winner-box hidden"></div>

  <!-- Eigene Maschine: gleiches Design wie Solo, Hebel rechts -->
  <div class="machine machine-mine">
    <div class="reels-panel">
      <div class="tile-name">Ich</div>
      <div class="money" id="my-money">Geld: 10.00$</div>

      <div class="reels">
        <div class="reel" id="my-r1">🍒</div>
        <div class="reel" id="my-r2">🍋</div>
        <div class="reel" id="my-r3">⭐</div>
      </div>

      <div class="status" id="my-status">Hebel ziehen!</div>

      <label>Einsatz</label>
      <input id="bet" type="number" value="1" min="1">
    </div>

    <div class="lever-panel">
      <button id="btn-spin" class="lever-btn">🔴<br>│<br>│<br>│<br>■■■</button>
    </div>
  </div>

  <h3 class="others-title">Mitspieler</h3>
  <div id="player-grid" class="player-grid"></div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
